services:
  merchant-analytics:
    build: .
    image: zalopay-merchant-analytics:latest
    container_name: merchant-analytics
    ports:
      - "7860:7860"
    # API key đọc từ file .env (KHÔNG bake vào image)
    env_file:
      - .env
    environment:
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 7860
    # Persist data ra host để không mất khi rebuild container
    volumes:
      - ./output:/app/output
      - ./uploads:/app/uploads
      - ./chroma_db:/app/chroma_db
    restart: unless-stopped
