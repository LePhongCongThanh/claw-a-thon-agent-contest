# Compose để CHẠY TỪ IMAGE CÓ SẴN (đã pull về) — KHÔNG build.
# Dùng khi bạn chỉ có image + file .env, không có source code.
#
#   1) Tạo .env (xem .env.example) với API key của bạn
#   2) Đặt tên image qua biến MERCHANT_ANALYTICS_IMAGE (hoặc sửa default bên dưới)
#   3) docker compose -f docker-compose.deploy.yml up -d
#
services:
  merchant-analytics:
    # Đổi thành image bạn đã push, vd: youruser/zalopay-merchant-analytics:latest
    image: ${MERCHANT_ANALYTICS_IMAGE:-zalopay-merchant-analytics:latest}
    container_name: merchant-analytics
    ports:
      - "7860:8080"   # localhost:7860 → container listen 8080 (chuẩn AgentBase)
    env_file:
      - .env                       # API key đọc lúc chạy (không nằm trong image)
    environment:
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 8080
    volumes:
      - ./output:/app/output       # báo cáo, log
      - ./uploads:/app/uploads     # file upload
      - ./chroma_db:/app/chroma_db # vector RAG — tự đầy khi dùng, giữ lại qua các lần chạy
    restart: unless-stopped
